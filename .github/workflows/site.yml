name: Catalog site

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "src/cloudstream_bot/scrapers/**"
      - "web/**"
      - "data/**"
      - ".github/workflows/site.yml"
  schedule:
    # Re-scrape every night at 03:00 UTC.
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      anime_limit:
        description: "AnimeWitcher dump limit (blank = full)"
        required: false
        default: ""
      asia_limit:
        description: "Asia2TV dump limit (blank = full)"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Dump AnimeWitcher
        env:
          ANIME_LIMIT: ${{ inputs.anime_limit }}
        run: |
          ARGS=""
          if [ -n "$ANIME_LIMIT" ]; then
            ARGS="--limit $ANIME_LIMIT"
          fi
          python -m scripts.dump_animewitcher $ARGS --output data/animewitcher.json

      - name: Dump Asia2TV
        env:
          ASIA_LIMIT: ${{ inputs.asia_limit }}
        run: |
          ARGS=""
          if [ -n "$ASIA_LIMIT" ]; then
            ARGS="--limit $ASIA_LIMIT"
          fi
          python -m scripts.dump_asia2tv $ARGS --output data/asia2tv.json

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build static site
        working-directory: web
        run: npm run build

      - name: Disable Jekyll on Pages output
        run: touch web/out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
