name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-import:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Lint (ruff)
        run: ruff check src/ colab_bot.py
      - name: Compile check
        run: python -m compileall -q src/ colab_bot.py
      - name: Import smoke test
        run: |
          PYTHONPATH=src python -c "
          from cloudstream_bot import bot, handlers, scrapers, extractors, i18n
          from cloudstream_bot.i18n import t
          assert t('en', 'welcome').startswith('<b>Cloudstream')
          assert t('ar', 'welcome')
          assert t('fr', 'welcome')
          print('ok')
          "
